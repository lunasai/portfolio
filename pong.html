<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>P_NG — Luna Borgo</title>

  <!-- ── Anti-FOUC ── -->
  <script>
    (function () {
      var valid = ['dark', 'light', 'fun'];
      var stored = localStorage.getItem('luna-theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.setAttribute('data-theme',
        (stored && valid.indexOf(stored) !== -1) ? stored : (prefersDark ? 'dark' : 'light'));
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Work+Sans:ital,wght@0,300..600;1,300..400&display=swap" rel="stylesheet">

  <style>
    @font-face {
      font-family: 'Nintendoid 1';
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: url('assets/fonts/nintendoid-1.otf') format('opentype');
    }

    @font-face {
      font-family: 'DM Mono';
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: url('assets/fonts/DMMono-400.woff2') format('woff2');
    }
    @font-face {
      font-family: 'DM Mono';
      font-style: normal;
      font-weight: 500;
      font-display: swap;
      src: url('assets/fonts/DMMono-500.woff2') format('woff2');
    }
    @font-face {
      font-family: 'DM Mono';
      font-style: italic;
      font-weight: 400;
      font-display: swap;
      src: url('assets/fonts/DMMono-400italic.woff2') format('woff2');
    }

    /* ─────────────────────────────────────────────
       TYPOGRAPHY TOKENS
    ───────────────────────────────────────────── */
    :root {
      --font-mono:  'DM Mono',  'Courier New', monospace;
      --font-serif: 'Fraunces', Georgia, serif;
      --font-sans:  'Work Sans', system-ui, sans-serif;
      --serif-display: 'SOFT' 0, 'WONK' 1;
    }

    /* ─────────────────────────────────────────────
       COLOR TOKENS — dark default
    ───────────────────────────────────────────── */
    :root {
      --color-bg:      #0e0b09;
      --color-text:    #faf3e3;
      --color-surface: #161210;
      --color-primary: #9b8fff;
      --color-accent:  #82e785;
      --color-muted:   #5c5048;
      --color-border:  #1d1a16;
      --grain-opacity: 0.22;
      --grain-blend:   overlay;
      --color-primary-100: #e8e5ff;
      --color-primary-300: #c4bcff;
      --color-primary-500: #9b8fff;
      --color-primary-700: #6b5fe8;
      --color-primary-900: #3d31b0;
      --color-accent-100: #d4f5d5;
      --color-accent-300: #82e785;
      --color-accent-500: #52c758;
      --color-accent-700: #3aaa40;
      --color-accent-900: #1e6b22;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --color-bg:      #f6f4ff;
        --color-text:    #120f2a;
        --color-surface: #ebe7ff;
        --color-primary: #4e42d0;
        --color-accent:  #1e9248;
        --color-muted:   #6e67a8;
        --color-border:  #cdc8f0;
        --grain-opacity: 0.05;
        --grain-blend:   multiply;
        --color-primary-100: #e8e5ff;
        --color-primary-300: #9b8fff;
        --color-primary-500: #6b5fe8;
        --color-primary-700: #4e42d0;
        --color-primary-900: #2f2597;
        --color-accent-100: #d4f5d5;
        --color-accent-300: #4fcf57;
        --color-accent-500: #1e9248;
        --color-accent-700: #156832;
        --color-accent-900: #0d4116;
      }
    }

    [data-theme="dark"] {
      --color-bg:      #0e0b09;
      --color-text:    #faf3e3;
      --color-surface: #161210;
      --color-primary: #9b8fff;
      --color-accent:  #82e785;
      --color-muted:   #5c5048;
      --color-border:  #1d1a16;
      --grain-opacity: 0.22;
      --grain-blend:   overlay;
      --color-primary-100: #e8e5ff;
      --color-primary-300: #c4bcff;
      --color-primary-500: #9b8fff;
      --color-primary-700: #6b5fe8;
      --color-primary-900: #3d31b0;
      --color-accent-100: #d4f5d5;
      --color-accent-300: #82e785;
      --color-accent-500: #52c758;
      --color-accent-700: #3aaa40;
      --color-accent-900: #1e6b22;
    }

    [data-theme="light"] {
      --color-bg:      #f6f4ff;
      --color-text:    #120f2a;
      --color-surface: #ebe7ff;
      --color-primary: #4e42d0;
      --color-accent:  #1e9248;
      --color-muted:   #6e67a8;
      --color-border:  #cdc8f0;
      --grain-opacity: 0.05;
      --grain-blend:   multiply;
      --color-primary-100: #e8e5ff;
      --color-primary-300: #9b8fff;
      --color-primary-500: #6b5fe8;
      --color-primary-700: #4e42d0;
      --color-primary-900: #2f2597;
      --color-accent-100: #d4f5d5;
      --color-accent-300: #4fcf57;
      --color-accent-500: #1e9248;
      --color-accent-700: #156832;
      --color-accent-900: #0d4116;
    }

    [data-theme="fun"] {
      --color-bg:      #0e0b09;
      --color-text:    #faf3e3;
      --color-surface: #161210;
      --color-muted:   #5c5048;
      --color-border:  #1d1a16;
      --grain-opacity: 0.22;
      --grain-blend:   overlay;
      --color-primary: #82e785;
      --color-accent:  #9b8fff;
      --color-primary-100: #d4f5d5;
      --color-primary-300: #82e785;
      --color-primary-500: #52c758;
      --color-primary-700: #3aaa40;
      --color-primary-900: #1e6b22;
      --color-accent-100: #e8e5ff;
      --color-accent-300: #c4bcff;
      --color-accent-500: #9b8fff;
      --color-accent-700: #6b5fe8;
      --color-accent-900: #3d31b0;
      --font-serif:    'Nintendoid 1', monospace;
      --serif-display: normal;
      --cursor-fun-default: url("assets/cursors/Aero Arrow Live Green Cursor.cur"), auto;
      --cursor-fun-link:    url("assets/cursors/Aero Link Live Green Cursor.cur"), pointer;
    }

    html[data-theme="fun"],
    html[data-theme="fun"] body {
      cursor: var(--cursor-fun-default);
    }

    html[data-theme="fun"] a,
    html[data-theme="fun"] button,
    html[data-theme="fun"] [role="button"],
    html[data-theme="fun"] .theme-text,
    html[data-theme="fun"] .level-btn,
    html[data-theme="fun"] label[for],
    html[data-theme="fun"] summary {
      cursor: var(--cursor-fun-link);
    }

    /* ─────────────────────────────────────────────
       RESET & BASE
    ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      height: 100%;
      font-size: 100%;
      transition: background-color 0.35s ease, color 0.35s ease;
    }

    body {
      height: 100%;
      overflow: hidden;
      background: var(--color-bg);
      color: var(--color-text);
      font-family: var(--font-sans);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      transition: background-color 0.35s ease, color 0.35s ease;
    }

    /* DM Mono rule */
    .wordmark, .nav a, .game-instructions,
    .theme-text, .theme-sep, .level-btn, .level-sep {
      font-family: var(--font-mono);
    }

    /* ─────────────────────────────────────────────
       GRAIN OVERLAY
    ───────────────────────────────────────────── */
    .grain {
      position: fixed;
      inset: -10%;
      width: 120%; height: 120%;
      pointer-events: none;
      z-index: 900;
      opacity: var(--grain-opacity);
      mix-blend-mode: var(--grain-blend);
      transition: opacity 0.35s ease;
      animation: grain-drift 0.5s steps(1) infinite;
    }

    @keyframes grain-drift {
      0%   { transform: translate(0, 0);       }
      20%  { transform: translate(-1.5%, 1%);  }
      40%  { transform: translate(2%, -1%);    }
      60%  { transform: translate(-1%, 2%);    }
      80%  { transform: translate(1.5%, -.5%); }
      100% { transform: translate(0, 0);       }
    }

    /* ─────────────────────────────────────────────
       LAYOUT — sidebar + full game area
    ───────────────────────────────────────────── */
    .layout {
      display: grid;
      grid-template-columns: 0.25fr 1fr;
      height: 100vh;
    }

    /* ─────────────────────────────────────────────
       SIDEBAR
    ───────────────────────────────────────────── */
    .sidebar {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 44px 36px;
      border-right: 1px solid var(--color-border);
      transition: border-color 0.35s ease;
    }

    .sidebar-top { display: flex; flex-direction: column; gap: 52px; }
    .logo-block  { display: flex; flex-direction: column; gap: 16px; }

    .logo-mark {
      width: 22px; height: 32px;
      color: var(--color-text);
      transition: color 0.35s ease;
    }

    .wordmark {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0px;
      text-transform: uppercase;
      color: var(--color-text);
      opacity: 0.6;
      transition: color 0.35s ease;
    }

    .nav { display: flex; flex-direction: column; gap: 12px; }

    .nav a {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0px;
      text-transform: uppercase;
      color: var(--color-text);
      opacity: 0.6;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: opacity 0.25s ease, color 0.25s ease;
    }

    .nav a:hover  { opacity: 1; }

    .nav a:focus-visible {
      opacity: 1;
      outline: 2px solid var(--color-primary);
      outline-offset: 3px;
      border-radius: 2px;
    }

    .nav-dot {
      width: 4px; height: 4px;
      border-radius: 2px;
      background: var(--color-primary);
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.25s ease, background-color 0.25s ease;
    }

    /* P_NG active: accent green for both dot and text */
    .nav a.active {
      color: var(--color-accent);
      opacity: 1;
    }

    .nav a.active .nav-dot {
      background: var(--color-accent);
      opacity: 1;
    }

    /* Sidebar bottom */
    .sidebar-bottom { display: flex; flex-direction: column; gap: 14px; }

    .game-instructions {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0px;
      text-transform: uppercase;
      color: var(--color-text);
      opacity: 0.65;
      line-height: 1.67;
      transition: color 0.35s ease;
    }

    .level-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .level-btn,
    .level-sep {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0px;
      text-transform: uppercase;
      color: var(--color-text);
      opacity: 0.65;
      transition: opacity 0.25s ease, color 0.25s ease;
    }

    .level-btn {
      appearance: none;
      background: transparent;
      border: 0;
      padding: 0;
      cursor: pointer;
      line-height: 1;
      color: inherit;
    }

    .level-btn:hover     { opacity: 0.9; }
    .level-btn.is-active { opacity: 1; color: var(--color-accent); }

    .level-btn:focus-visible {
      outline: 2px solid var(--color-primary);
      outline-offset: 2px;
      border-radius: 2px;
    }

    .sidebar-divider {
      width: 100%;
      height: 1px;
      background: var(--color-text);
      opacity: 0.2;
      transition: background-color 0.35s ease;
    }

    .footer-row { display: flex; flex-direction: column; gap: 12px; }

    .footer-meta {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .theme-text,
    .theme-sep {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0px;
      text-transform: uppercase;
      color: var(--color-text);
      opacity: 0.65;
      transition: opacity 0.25s ease, color 0.25s ease;
    }

    .theme-text {
      appearance: none;
      background: transparent;
      border: 0;
      padding: 0;
      cursor: pointer;
      line-height: 1;
      color: inherit;
    }

    .theme-text:hover { opacity: 0.9; }
    .theme-text.is-active { opacity: 1; }

    .theme-text:focus-visible {
      outline: 2px solid var(--color-primary);
      outline-offset: 2px;
      border-radius: 2px;
    }

    /* ─────────────────────────────────────────────
       GAME AREA
    ───────────────────────────────────────────── */
    .game-area {
      position: relative;
      overflow: hidden;
      background: var(--color-bg);
      transition: background-color 0.35s ease;
      cursor: none;
    }

    #pong-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* ─────────────────────────────────────────────
       RESPONSIVE
    ───────────────────────────────────────────── */
    @media (max-width: 767px) {
      body { overflow: auto; }

      .layout {
        display: flex;
        flex-direction: column;
        height: auto;
        min-height: 100vh;
      }

      .sidebar {
        flex-direction: row;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        padding: 20px 24px;
        border-right: none;
        border-bottom: 1px solid var(--color-border);
        gap: 12px;
        position: sticky;
        top: 0;
        z-index: 10;
        background: var(--color-bg);
      }

      .sidebar-top {
        flex-direction: row;
        align-items: center;
        gap: 20px;
      }

      .sidebar-bottom { display: none; }

      .game-area {
        height: 100vw;
        max-height: 80vh;
      }
    }

    /* ─────────────────────────────────────────────
       REDUCED MOTION
    ───────────────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      .grain {
        animation: none;
      }

      html,
      body,
      .sidebar,
      .game-area,
      .nav a,
      .nav-dot,
      .wordmark,
      .game-instructions,
      .theme-text,
      .level-btn,
      .level-sep,
      .sidebar-divider {
        transition: none;
      }
    }
  </style>
</head>

  <script>
    /* ── Theme toggle ───────────────────────────────────────────────── */
    const html = document.documentElement;
    const themeButtons = document.querySelectorAll('.theme-text[data-theme]');

    function applyTheme(theme) {
      html.setAttribute('data-theme', theme);
      localStorage.setItem('luna-theme', theme);
      themeButtons.forEach(btn => {
        const active = btn.getAttribute('data-theme') === theme;
        btn.classList.toggle('is-active', active);
        btn.setAttribute('aria-pressed', active ? 'true' : 'false');
      });
    }

    applyTheme(html.getAttribute('data-theme') || 'dark');

    themeButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        const next = btn.getAttribute('data-theme');
        if (next) applyTheme(next);
      });
    });

    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
      if (!localStorage.getItem('luna-theme'))
        applyTheme(e.matches ? 'dark' : 'light');
    });

    /* ── Pong game ─────────────────────────────────────────────────── */
    (function () {
      const canvas = document.getElementById('pong-canvas');
      const ctx    = canvas.getContext('2d');

      /* ── Speed levels ───────────────────────────── */
      const LEVELS = [
        { ballSpeed: 8.5, aiSpeed: 6.5, speedCap: 19, serveDelay: 600 },
        { ballSpeed: 11,  aiSpeed: 9,   speedCap: 25, serveDelay: 400 },
        { ballSpeed: 14,  aiSpeed: 12,  speedCap: 32, serveDelay: 250 },
      ];
      let levelIndex = Math.min(2, Math.max(0, +(localStorage.getItem('luna-pong-level') || 1)));

      /* ── Constants ──────────────────────────────── */
      const PADDLE_W_PCT  = 0.045;   // fraction of game area width
      const PADDLE_H_PCT  = 0.262;   // fraction of game area height (fixed)
      const BALL_SIZE_PCT = 0.044;   // fraction of game area width (square)
      const KB_SPEED      = 7;       // px/frame keyboard input

      /* ── State ──────────────────────────────────── */
      let W = 0, H = 0;
      let paused  = false;
      let serving = true;
      let serveTimer = null;

      const scores = { left: 0, right: 0 };
      const leftPaddle  = { x: 0, y: 0, w: 0, h: 0 };
      const rightPaddle = { x: 0, y: 0, w: 0, h: 0 };
      const ball        = { x: 0, y: 0, size: 0, vx: 0, vy: 0 };

      let mouseY = -1;
      const keys = {};

      /* ── Sound ──────────────────────────────────── */
      /*
       *  wall   → Sound 18782.mp3  shortest file — quick wall-bounce blip
       *  hitL   → Sound 18783.mp3  player (left) paddle hit
       *  hitR   → Sound 18784.mp3  AI (right) paddle hit
       *  score  → Sound 18785.mp3  point scored by either side
       *  serve  → Sound 18787.mp3  largest file — ball launches each serve
       */
      const SFX_SRCS = {
        wall:  'assets/sounds/Sound 18782.mp3',
        hitL:  'assets/sounds/Sound 18783.mp3',
        hitR:  'assets/sounds/Sound 18784.mp3',
        score: 'assets/sounds/Sound 18785.mp3',
        serve: 'assets/sounds/Sound 18787.mp3',
      };

      const sfx = {};
      Object.keys(SFX_SRCS).forEach(function (key) {
        const a = new Audio(SFX_SRCS[key]);
        a.preload = 'auto';
        sfx[key] = a;
      });

      function playSound(key) {
        const src = sfx[key];
        if (!src) return;
        const clone = src.cloneNode();
        clone.volume = key === 'serve' ? 0.3 : 0.45;
        clone.play().catch(function () {});
      }

      /* ── Color helpers ──────────────────────────── */
      function getTokenColor(token) {
        return getComputedStyle(document.documentElement)
          .getPropertyValue(token).trim();
      }

      function getColors() {
        return {
          bg:      getTokenColor('--color-bg'),
          accent:  getTokenColor('--color-accent'),
          primary: getTokenColor('--color-primary'),
          text:    getTokenColor('--color-text'),
        };
      }

      /* ── Resize ─────────────────────────────────── */
      function resize() {
        const container = canvas.parentElement;
        W = container.clientWidth  || 800;
        H = container.clientHeight || 600;
        canvas.width  = W;
        canvas.height = H;

        const pw = Math.round(W * PADDLE_W_PCT);
        const ph = Math.round(H * PADDLE_H_PCT);
        const bs = Math.round(W * BALL_SIZE_PCT);

        leftPaddle.w  = pw;  leftPaddle.h  = ph;  leftPaddle.x = 0;
        rightPaddle.w = pw;  rightPaddle.h = ph;  rightPaddle.x = W - pw;
        ball.size = bs;

        /* Keep paddle Y sensible after resize */
        leftPaddle.y  = clampPaddle(leftPaddle.y  || H / 2 - ph / 2, ph);
        rightPaddle.y = clampPaddle(rightPaddle.y || H / 2 - ph / 2, ph);

        resetBall(1, true);
      }

      function clampPaddle(y, h) {
        return Math.max(0, Math.min(H - h, y));
      }

      /* ── Ball reset ─────────────────────────────── */
      function resetBall(direction, immediate) {
        ball.x  = W / 2 - ball.size / 2;
        ball.y  = H / 2 - ball.size / 2;
        ball.vx = 0;
        ball.vy = 0;
        serving = true;

        if (serveTimer) clearTimeout(serveTimer);
        const lvl   = LEVELS[levelIndex];
        const delay = immediate ? 0 : lvl.serveDelay;
        serveTimer = setTimeout(function () {
          serving = false;
          const angle = (Math.random() * 0.5 - 0.25);
          ball.vx = direction * lvl.ballSpeed * Math.cos(angle);
          ball.vy = lvl.ballSpeed * Math.sin(angle);
          playSound('serve');
        }, delay);
      }

      /* ── Input ──────────────────────────────────── */
      document.addEventListener('mousemove', function (e) {
        const rect = canvas.getBoundingClientRect();
        mouseY = e.clientY - rect.top;
      });

      canvas.parentElement.addEventListener('mouseleave', function () {
        mouseY = -1;
      });

      document.addEventListener('keydown', function (e) {
        keys[e.code] = true;
        if (e.code === 'Space' || e.code === 'KeyP') {
          e.preventDefault();
          paused = !paused;
        }
        if (e.code === 'KeyZ') setLevel(levelIndex - 1);
        if (e.code === 'KeyX') setLevel(levelIndex + 1);
      });

      document.addEventListener('keyup', function (e) {
        delete keys[e.code];
      });

      /* Basic touch: drag finger on the canvas to move the left paddle */
      canvas.addEventListener('touchmove', function (e) {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        mouseY = e.touches[0].clientY - rect.top;
      }, { passive: false });

      /* ── Update ─────────────────────────────────── */
      function update() {
        /* Left paddle — mouse takes priority; fall back to keyboard */
        if (mouseY >= 0) {
          leftPaddle.y = mouseY - leftPaddle.h / 2;
        } else {
          if (keys['ArrowUp'])   leftPaddle.y -= KB_SPEED;
          if (keys['ArrowDown']) leftPaddle.y += KB_SPEED;
        }
        leftPaddle.y = clampPaddle(leftPaddle.y, leftPaddle.h);

        if (paused || serving) return;

        /* AI — right paddle tracks ball centre */
        const ballCY = ball.y + ball.size / 2;
        const rCY    = rightPaddle.y + rightPaddle.h / 2;
        const diff   = ballCY - rCY;
        if (Math.abs(diff) > 1) {
          rightPaddle.y += Math.sign(diff) * Math.min(LEVELS[levelIndex].aiSpeed, Math.abs(diff));
        }
        rightPaddle.y = clampPaddle(rightPaddle.y, rightPaddle.h);

        /* Ball movement */
        ball.x += ball.vx;
        ball.y += ball.vy;

        /* Top / bottom wall bounce */
        if (ball.y <= 0) {
          ball.y  = 0;
          ball.vy = Math.abs(ball.vy);
          playSound('wall');
        }
        if (ball.y + ball.size >= H) {
          ball.y  = H - ball.size;
          ball.vy = -Math.abs(ball.vy);
          playSound('wall');
        }

        /* Left paddle collision */
        if (ball.vx < 0 &&
            ball.x     <= leftPaddle.x + leftPaddle.w &&
            ball.x + ball.size >= leftPaddle.x &&
            ball.y + ball.size >= leftPaddle.y &&
            ball.y     <= leftPaddle.y + leftPaddle.h) {
          ball.x = leftPaddle.x + leftPaddle.w;
          const relY = (ball.y + ball.size / 2 - leftPaddle.y) / leftPaddle.h - 0.5;
          ball.vx =  Math.abs(ball.vx) * 1.04;
          ball.vy =  relY * LEVELS[levelIndex].ballSpeed * 2.2;
          capSpeed();
          playSound('hitL');
        }

        /* Right paddle collision */
        if (ball.vx > 0 &&
            ball.x + ball.size >= rightPaddle.x &&
            ball.x     <= rightPaddle.x + rightPaddle.w &&
            ball.y + ball.size >= rightPaddle.y &&
            ball.y     <= rightPaddle.y + rightPaddle.h) {
          ball.x = rightPaddle.x - ball.size;
          const relY = (ball.y + ball.size / 2 - rightPaddle.y) / rightPaddle.h - 0.5;
          ball.vx = -Math.abs(ball.vx) * 1.04;
          ball.vy =  relY * LEVELS[levelIndex].ballSpeed * 2.2;
          capSpeed();
          playSound('hitR');
        }

        /* Scoring */
        if (ball.x + ball.size < 0) {
          scores.right++;
          playSound('score');
          resetBall(1, false);
        }
        if (ball.x > W) {
          scores.left++;
          playSound('score');
          resetBall(-1, false);
        }
      }

      function capSpeed() {
        const cap = LEVELS[levelIndex].speedCap;
        const spd = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
        if (spd > cap) {
          ball.vx = (ball.vx / spd) * cap;
          ball.vy = (ball.vy / spd) * cap;
        }
      }

      /* ── Draw ───────────────────────────────────── */
      function draw() {
        const c = getColors();

        /* Background */
        ctx.fillStyle = c.bg;
        ctx.fillRect(0, 0, W, H);

        /* Center dashed line */
        ctx.save();
        ctx.setLineDash([8, 10]);
        ctx.lineWidth   = 4;
        ctx.strokeStyle = hexToRgba(c.text, 0.15);
        ctx.beginPath();
        ctx.moveTo(W / 2, 0);
        ctx.lineTo(W / 2, H);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.restore();

        /* Scores */
        ctx.font         = "40px 'Nintendoid 1', monospace";
        ctx.fillStyle    = c.accent;
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'top';
        ctx.fillText(pad3(scores.left),  W / 4,     36);
        ctx.fillText(pad3(scores.right), W * 3 / 4, 36);

        /* Paddles */
        ctx.fillStyle = c.accent;
        ctx.fillRect(leftPaddle.x,  leftPaddle.y,  leftPaddle.w,  leftPaddle.h);
        ctx.fillRect(rightPaddle.x, rightPaddle.y, rightPaddle.w, rightPaddle.h);

        /* Ball */
        ctx.fillStyle = c.primary;
        ctx.fillRect(ball.x, ball.y, ball.size, ball.size);

        /* Pause overlay */
        if (paused) {
          ctx.fillStyle = 'rgba(0, 0, 0, 0.45)';
          ctx.fillRect(0, 0, W, H);
          ctx.font         = "40px 'Nintendoid 1', monospace";
          ctx.fillStyle    = c.accent;
          ctx.textAlign    = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('PAUSED', W / 2, H / 2);
        }

        /* Serve countdown dots while waiting */
        if (serving && !paused) {
          ctx.fillStyle    = hexToRgba(c.accent, 0.5);
          ctx.textAlign    = 'center';
          ctx.textBaseline = 'middle';
          ctx.font         = "20px 'Nintendoid 1', monospace";
          ctx.fillText('• • •', W / 2, H / 2 + ball.size * 2);
        }
      }

      /* ── Helpers ────────────────────────────────── */
      function pad3(n) {
        return String(Math.min(n, 999)).padStart(3, '0');
      }

      function hexToRgba(hex, alpha) {
        /* Handles #rrggbb and #rgb */
        const h = hex.replace('#', '');
        let r, g, b;
        if (h.length === 3) {
          r = parseInt(h[0] + h[0], 16);
          g = parseInt(h[1] + h[1], 16);
          b = parseInt(h[2] + h[2], 16);
        } else {
          r = parseInt(h.slice(0, 2), 16);
          g = parseInt(h.slice(2, 4), 16);
          b = parseInt(h.slice(4, 6), 16);
        }
        if (isNaN(r) || isNaN(g) || isNaN(b)) return 'rgba(255,255,255,' + alpha + ')';
        return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
      }

      /* ── Level selector ─────────────────────────── */
      function setLevel(n) {
        const oldSpeed = LEVELS[levelIndex].ballSpeed;
        levelIndex = Math.min(2, Math.max(0, n));
        localStorage.setItem('luna-pong-level', levelIndex);
        /* Update sidebar buttons */
        document.querySelectorAll('.level-btn').forEach(function (btn) {
          const active = +btn.getAttribute('data-level') === levelIndex;
          btn.classList.toggle('is-active', active);
          btn.setAttribute('aria-pressed', active ? 'true' : 'false');
        });
        /* Rescale the ball's current velocity proportionally — feels immediate */
        if (!serving) {
          const ratio = LEVELS[levelIndex].ballSpeed / oldSpeed;
          ball.vx *= ratio;
          ball.vy *= ratio;
          capSpeed();
        }
      }

      /* ── Loop ───────────────────────────────────── */
      function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
      }

      /* ── Kick off ───────────────────────────────── */
      const ro = new ResizeObserver(function () { resize(); });
      ro.observe(canvas.parentElement);

      resize();
      setLevel(levelIndex);
      loop();
    }());
  </script>

</body>
</html>
